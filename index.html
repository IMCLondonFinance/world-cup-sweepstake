<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Office Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#00843D;--green-dark:#005C2A;--green-light:#E8F5EE;
    --gold:#C8973A;--gold-light:#FDF3E3;--red:#CC2529;
    --bg:#F4F1EB;--card:#FFFFFF;--text:#1A1A1A;--muted:#6B6B6B;--border:#DDD8CE;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--green-dark);color:#fff}
  .header-inner{max-width:1100px;margin:0 auto;padding:2.5rem 2rem 2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem}
  .trophy{font-size:3rem;line-height:1;margin-bottom:.5rem}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);letter-spacing:.04em;color:#fff;line-height:1}
  header h1 span{color:var(--gold)}
  .subtitle{font-size:.85rem;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;margin-top:.4rem}
  .header-stats{display:flex;gap:1.5rem;flex-shrink:0}
  .hstat{text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.7rem 1.1rem}
  .hstat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);line-height:1}
  .hstat-label{font-size:.72rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .stripe{height:6px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 33%,var(--green) 33%,var(--green) 66%,var(--red) 66%,var(--red) 100%)}
  nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .nav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;display:flex}
  nav button{background:none;border:none;border-bottom:3px solid transparent;padding:1rem 1.3rem;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
  nav button:hover{color:var(--text)}
  nav button.active{color:var(--green-dark);border-bottom-color:var(--green)}
  main{max-width:1100px;margin:0 auto;padding:2rem}
  .section{display:none}.section.visible{display:block}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--green-dark);margin-bottom:1.5rem;padding-bottom:.6rem;border-bottom:2px solid var(--green);display:flex;align-items:center;gap:.5rem}
  .participants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
  .p-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;transition:box-shadow .15s,transform .15s}
  .p-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
  .p-flag{font-size:1.8rem;margin-bottom:.4rem}
  .p-team{font-weight:600;font-size:.95rem;margin-bottom:.2rem}
  .p-group{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:var(--green);border-radius:4px;padding:1px 6px;display:inline-block;margin-bottom:.5rem}
  .p-owner{font-size:.82rem;color:var(--muted)}
  .p-owner::before{content:'👤 '}
  .group-block{margin-bottom:2.5rem}
  .group-heading{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;background:var(--green);color:#fff;padding:.5rem 1rem;border-radius:6px;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
  .group-teams-pill{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:400;color:rgba(255,255,255,.75)}
  .fixtures-list{display:flex;flex-direction:column;gap:.5rem}
  .fixture-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;transition:box-shadow .15s}
  .fixture-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
  .fixture-card.has-score{border-left:3px solid var(--green)}
  .fixture-card.is-live{border-left:3px solid var(--red);background:#fff8f8}
  .fixture-card.highlighted-fixture{background:var(--gold-light);border-color:#e0c070}
  .fixture-team{display:flex;align-items:center;gap:.5rem;font-weight:500;font-size:.9rem}
  .fixture-team.right{flex-direction:row-reverse;text-align:right}
  .team-flag{font-size:1.3rem;flex-shrink:0}
  .team-info{min-width:0}
  .team-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-owner-small{font-size:.75rem;color:var(--green-dark);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-owner-small::before{content:'👤 ';font-size:.68rem}
  .fixture-vs{text-align:center;flex-shrink:0;min-width:72px}
  .vs-badge{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.3rem .6rem;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--muted);line-height:1;display:inline-block}
  .vs-date{font-size:.68rem;color:var(--muted);margin-top:3px}
  .score-box{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.03em;color:var(--green-dark);line-height:1}
  .score-box.live{color:var(--red)}
  .score-label{font-family:'DM Sans',sans-serif;font-size:.62rem;color:var(--muted);margin-top:2px}
  .score-label.live{color:var(--red);font-weight:600}
  .kickoff-time{font-size:.82rem;font-weight:600;color:var(--text)}
  .kickoff-sub{font-size:.65rem;color:var(--muted);margin-top:1px}
  .api-status{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
  .api-status b{color:var(--green-dark)}
  .live-pill{display:inline-block;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.06em;margin-left:6px;vertical-align:middle;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .owner-select-wrap{margin-bottom:2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
  .owner-select-wrap label{font-weight:500;font-size:.9rem;color:var(--muted)}
  select{font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.55rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;outline:none;min-width:200px}
  select:focus{border-color:var(--green)}
  .owner-profile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem}
  .owner-avatar{width:64px;height:64px;border-radius:50%;background:var(--green-dark);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .owner-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em}
  .owner-tag{font-size:.82rem;color:var(--muted);margin-top:.2rem}
  .owner-teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.8rem;margin-bottom:2rem}
  .owner-team-card{background:var(--green-light);border:1px solid #b5dac7;border-radius:8px;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem}
  .owner-team-flag{font-size:1.5rem}
  .owner-team-name{font-weight:600;font-size:.88rem}
  .owner-team-group{font-size:.72rem;color:var(--green-dark)}
  .owner-fixtures-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.05em;color:var(--green-dark);margin-bottom:.8rem;margin-top:.5rem}
  .both-badge{background:var(--gold);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .search-bar{width:100%;font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.65rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none;margin-bottom:1.5rem}
  .search-bar:focus{border-color:var(--green)}
  .countdown-wrap{background:var(--green-dark);color:#fff;border-radius:14px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.5rem}
  .countdown-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.6);margin-bottom:1rem}
  .countdown-units{display:flex;justify-content:center;gap:1.2rem;margin-bottom:1rem}
  .cunit{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:.8rem 1.3rem;min-width:70px}
  .cunit-num{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--gold);line-height:1}
  .cunit-label{font-size:.68rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
  .countdown-msg{font-size:1rem;color:rgba(255,255,255,.8);margin-top:.5rem}
  .today-date-heading{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--green-dark);margin-bottom:1rem}
  .no-games{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2.5rem;text-align:center;color:var(--muted)}
  .no-games .icon{font-size:2.5rem;margin-bottom:.5rem}
  .today-nav{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .today-nav button{font-family:'DM Sans',sans-serif;font-size:.82rem;padding:.4rem .9rem;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
  .today-nav button:hover{border-color:var(--green);color:var(--green-dark)}
  .today-nav button.active-day{background:var(--green);border-color:var(--green);color:#fff}
  .today-badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:10px;text-transform:uppercase;margin-left:5px;vertical-align:middle}
  @media(max-width:600px){
    .header-stats{display:none}main{padding:1rem}
    .countdown-units{gap:.6rem}.cunit{min-width:55px;padding:.6rem .8rem}.cunit-num{font-size:1.8rem}
    .team-name{font-size:.82rem}.team-owner-small{font-size:.65rem}
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="trophy">🏆</div>
      <h1>World Cup <span>2026</span><br>Office Sweepstake</h1>
      <div class="subtitle">USA · Canada · Mexico &nbsp;|&nbsp; 11 June – 19 July 2026</div>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num">48</div><div class="hstat-label">Teams</div></div>
      <div class="hstat"><div class="hstat-num">12</div><div class="hstat-label">Groups</div></div>
      <div class="hstat"><div class="hstat-num">48</div><div class="hstat-label">Players</div></div>
      <div class="hstat"><div class="hstat-num">104</div><div class="hstat-label">Matches</div></div>
    </div>
  </div>
  <div class="stripe"></div>
</header>
<nav>
  <div class="nav-inner">
    <button class="active" onclick="showSection('participants',this)">🗂 All Teams</button>
    <button onclick="showSection('fixtures',this)">📅 Fixtures</button>
    <button onclick="showSection('today',this)">⚽ Today</button>
    <button onclick="showSection('myteam',this)">👤 By Owner</button>
  </div>
</nav>
<main>
  <section id="participants" class="section visible">
    <div class="section-title">🌍 All 48 Teams &amp; Owners</div>
    <input class="search-bar" type="text" placeholder="Search team or owner…" oninput="filterParticipants(this.value)">
    <div class="participants-grid" id="participants-grid"></div>
  </section>
  <section id="fixtures" class="section">
    <div class="section-title">📅 Group Stage Fixtures</div>
    <div class="api-status" id="api-status"></div>
    <div id="fixtures-container"><div class="no-games"><div class="icon">📡</div><p>Loading scores…</p></div></div>
  </section>
  <section id="today" class="section">
    <div class="section-title">⚽ Today's Matches</div>
    <div id="today-content"></div>
  </section>
  <section id="myteam" class="section">
    <div class="section-title">👤 View by Owner</div>
    <div class="owner-select-wrap">
      <label for="owner-select">Select a participant:</label>
      <select id="owner-select" onchange="renderOwnerView(this.value)">
        <option value="">— choose owner —</option>
      </select>
    </div>
    <div id="owner-content"></div>
  </section>
</main>
<script>
const API_TOKEN='69dfe4295e3e4f20ba53fc5f11e8db8d';
const owners={"Algeria":"Ethan Mercer","Argentina":"Ava Holloway","Australia":"Liam Prescott","Austria":"Nora Whitfield","Belgium":"Mason Callahan","Bosnia & Herzegovina":"Chloe Bennett","Brazil":"Caleb Thornton","Canada":"Lily Hartwell","Cape Verde":"Owen Carlisle","Colombia":"Grace Ellison","Croatia":"Noah Fletcher","Cura\u00e7ao":"Zoe Langford","Czechia":"Lucas Montgomery","DR Congo":"Ruby Sinclair","Ecuador":"Henry Sullivan","Egypt":"Mia Bradford","England":"Jack Donovan","France":"Emma Caldwell","Germany":"Samuel Hastings","Ghana":"Isla Reynolds","Haiti":"Benjamin Crawford","Iran":"Hannah Pierce","Iraq":"Daniel Whitaker","Ivory Coast":"Sophie Kendall","Japan":"Elijah Palmer","Jordan":"Lucy Harrington","Mexico":"Nathan Brooks","Morocco":"Stella Ramsey","Netherlands":"Isaac Thornton","New Zealand":"Violet Chandler","Norway":"Alexander Grant","Panama":"Claire Hudson","Paraguay":"Jacob Mercer","Portugal":"Eleanor Price","Qatar":"Matthew Collins","Saudi Arabia":"Audrey Bennett","Scotland":"Gabriel Lawson","Senegal":"Scarlett Monroe","South Africa":"Ryan Foster","South Korea":"Abigail Sutton","Spain":"Christopher Hayes","Sweden":"Madeline Parker","Switzerland":"Thomas Griffin","Tunisia":"Charlotte Dawson","T\u00fcrkiye":"Andrew Wallace","Uruguay":"Penelope Rhodes","USA":"Jonathan Pierce","Uzbekistan":"Victoria Emerson"};
const flags={"Algeria":"\ud83c\udde9\ud83c\uddff","Argentina":"\ud83c\udde6\ud83c\uddf7","Australia":"\ud83c\udde6\ud83c\uddfa","Austria":"\ud83c\udde6\ud83c\uddf9","Belgium":"\ud83c\udde7\ud83c\uddea","Bosnia & Herzegovina":"\ud83c\udde7\ud83c\udde6","Brazil":"\ud83c\udde7\ud83c\uddf7","Canada":"\ud83c\udde8\ud83c\udde6","Cape Verde":"\ud83c\udde8\ud83c\uddfb","Colombia":"\ud83c\udde8\ud83c\uddf4","Croatia":"\ud83c\udded\ud83c\uddf7","Cura\u00e7ao":"\ud83c\udde8\ud83c\uddfc","Czechia":"\ud83c\udde8\ud83c\uddff","DR Congo":"\ud83c\udde8\ud83c\udde9","Ecuador":"\ud83c\uddea\ud83c\udde8","Egypt":"\ud83c\uddea\ud83c\uddec","England":"\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc65\udb40\udc6e\udb40\udc67\udb40\udc7f","France":"\ud83c\uddeb\ud83c\uddf7","Germany":"\ud83c\udde9\ud83c\uddea","Ghana":"\ud83c\uddec\ud83c\udded","Haiti":"\ud83c\udded\ud83c\uddf9","Iran":"\ud83c\uddee\ud83c\uddf7","Iraq":"\ud83c\uddee\ud83c\uddf6","Ivory Coast":"\ud83c\udde8\ud83c\uddee","Japan":"\ud83c\uddef\ud83c\uddf5","Jordan":"\ud83c\uddef\ud83c\uddf4","Mexico":"\ud83c\uddf2\ud83c\uddfd","Morocco":"\ud83c\uddf2\ud83c\udde6","Netherlands":"\ud83c\uddf3\ud83c\uddf1","New Zealand":"\ud83c\uddf3\ud83c\uddff","Norway":"\ud83c\uddf3\ud83c\uddf4","Panama":"\ud83c\uddf5\ud83c\udde6","Paraguay":"\ud83c\uddf5\ud83c\uddfe","Portugal":"\ud83c\uddf5\ud83c\uddf9","Qatar":"\ud83c\uddf6\ud83c\udde6","Saudi Arabia":"\ud83c\uddf8\ud83c\udde6","Scotland":"\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc73\udb40\udc63\udb40\udc74\udb40\udc7f","Senegal":"\ud83c\uddf8\ud83c\uddf3","South Africa":"\ud83c\uddff\ud83c\udde6","South Korea":"\ud83c\uddf0\ud83c\uddf7","Spain":"\ud83c\uddea\ud83c\uddf8","Sweden":"\ud83c\uddf8\ud83c\uddea","Switzerland":"\ud83c\udde8\ud83c\udded","Tunisia":"\ud83c\uddf9\ud83c\uddf3","T\u00fcrkiye":"\ud83c\uddf9\ud83c\uddf7","Uruguay":"\ud83c\uddfa\ud83c\uddfe","USA":"\ud83c\uddfa\ud83c\uddf8","Uzbekistan":"\ud83c\uddfa\ud83c\uddff"};
const groups={A:["Mexico","South Africa","South Korea","Czechia"],B:["Canada","Bosnia & Herzegovina","Qatar","Switzerland"],C:["Brazil","Morocco","Haiti","Scotland"],D:["USA","Paraguay","Australia","T\u00fcrkiye"],E:["Germany","Cura\u00e7ao","Ivory Coast","Ecuador"],F:["Netherlands","Japan","Sweden","Tunisia"],G:["Belgium","Egypt","Iran","New Zealand"],H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],I:["France","Senegal","Iraq","Norway"],J:["Argentina","Algeria","Austria","Jordan"],K:["Portugal","DR Congo","Uzbekistan","Colombia"],L:["England","Croatia","Ghana","Panama"]};
const teamGroup={};
Object.entries(groups).forEach(([g,ts])=>ts.forEach(t=>teamGroup[t]=g));

// Name normalisation — maps API short/full names to our keys
const nameMap={"Korea Republic":"South Korea","Czech Republic":"Czechia","Bosnia and Herzegovina":"Bosnia & Herzegovina","Curacao":"Cura\u00e7ao","Congo DR":"DR Congo","C\u00f4te d'Ivoire":"Ivory Coast","United States":"USA","Turkey":"T\u00fcrkiye","Cura\u00e7ao":"Cura\u00e7ao","DR Congo":"DR Congo","Ivory Coast":"Ivory Coast","T\u00fcrkiye":"T\u00fcrkiye","Czechia":"Czechia","Scotland":"Scotland","England":"England"};
function norm(n){return nameMap[n]||n;}

let apiMatches=[];
let lastUpdated=null;
let anyLive=false;

async function fetchMatches(){
  try{
    const r=await fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026',{headers:{'X-Auth-Token':API_TOKEN}});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    apiMatches=d.matches||[];
    lastUpdated=new Date();
    anyLive=apiMatches.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
    renderAll();
    scheduleRefresh();
  }catch(e){
    console.warn('API error',e);
    setStatus('Could not reach scores API. Retrying…');
    setTimeout(fetchMatches,30000);
  }
}

function setStatus(msg){
  const el=document.getElementById('api-status');
  if(el)el.innerHTML=msg;
}

function scheduleRefresh(){
  clearTimeout(window._refreshTimer);
  window._refreshTimer=setTimeout(fetchMatches, anyLive?30000:60000);
}

function findMatch(home,away){
  return apiMatches.find(m=>{
    const h=norm(m.homeTeam?.shortName||m.homeTeam?.name||'');
    const a=norm(m.awayTeam?.shortName||m.awayTeam?.name||'');
    return (h===home&&a===away)||(h===away&&a===home);
  });
}

function matchInfo(home,away){
  const m=findMatch(home,away);
  if(!m)return{type:'unknown'};
  const apiHome=norm(m.homeTeam?.shortName||m.homeTeam?.name||'');
  const swapped=apiHome!==home;
  const s=m.score;
  const ft=[s?.fullTime?.home,s?.fullTime?.away];
  const ht=[s?.halfTime?.home,s?.halfTime?.away];
  const [fs1,fs2]=swapped?[ft[1],ft[0]]:[ft[0],ft[1]];
  const [hs1,hs2]=swapped?[ht[1],ht[0]]:[ht[0],ht[1]];
  const utc=new Date(m.utcDate);
  const dateStr=utc.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const timeStr=utc.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(m.status==='FINISHED')return{type:'ft',s1:fs1??0,s2:fs2??0,date:dateStr};
  if(m.status==='IN_PLAY'||m.status==='PAUSED')return{type:'live',s1:fs1??0,s2:fs2??0,date:dateStr};
  if(m.status==='HALF_TIME')return{type:'ht',s1:hs1??0,s2:hs2??0,date:dateStr};
  return{type:'upcoming',date:dateStr,time:timeStr};
}

function teamCard(t,align){
  const r=align==='right';
  return '<div class="fixture-team'+(r?' right':'')+'"><span class="team-flag">'+(flags[t]||'🏳')+'</span><div class="team-info"><div class="team-name">'+t+'</div><div class="team-owner-small">'+(owners[t]||'')+'</div></div></div>';
}

function vsBlock(info){
  if(info.type==='ft')return '<div class="fixture-vs"><div class="score-box">'+info.s1+' \u2013 '+info.s2+'</div><div class="score-label">Full time</div></div>';
  if(info.type==='live')return '<div class="fixture-vs"><div class="score-box live">'+info.s1+' \u2013 '+info.s2+'</div><div class="score-label live">\u25cf Live</div></div>';
  if(info.type==='ht')return '<div class="fixture-vs"><div class="score-box live">'+info.s1+' \u2013 '+info.s2+'</div><div class="score-label live">Half time</div></div>';
  const t=info.time?'<div class="kickoff-sub">'+info.time+' local</div>':'';
  return '<div class="fixture-vs"><div class="vs-badge">VS</div><div class="vs-date">'+(info.date||'')+t+'</div></div>';
}

function fixtureCard(home,away,hl){
  const info=matchInfo(home,away);
  const live=info.type==='live'||info.type==='ht';
  const done=info.type==='ft';
  return '<div class="fixture-card'+(hl?' highlighted-fixture':'')+(done?' has-score':'')+(live?' is-live':'')+'">'+teamCard(home,'left')+vsBlock(info)+teamCard(away,'right')+'</div>';
}

function allPairs(g){
  const t=groups[g];
  return[[t[0],t[1]],[t[2],t[3]],[t[0],t[2]],[t[1],t[3]],[t[0],t[3]],[t[1],t[2]]];
}

function renderAll(){
  renderFixtures();
  renderToday();
  const sel=document.getElementById('owner-select');
  if(sel&&sel.value)renderOwnerView(sel.value);
}

function renderFixtures(){
  let html='';
  const t=lastUpdated?'Updated '+lastUpdated.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+(anyLive?' &nbsp;<span class="live-pill">&#9679; Live</span>':''):'Loading…';
  setStatus(t);
  Object.keys(groups).forEach(g=>{
    html+='<div class="group-block"><div class="group-heading">GROUP '+g+'<span class="group-teams-pill">'+groups[g].join(' \u00b7 ')+'</span></div><div class="fixtures-list">';
    allPairs(g).forEach(([h,a])=>{html+=fixtureCard(h,a,false);});
    html+='</div></div>';
  });
  document.getElementById('fixtures-container').innerHTML=html;
}

const TSTART=new Date('2026-06-11T00:00:00');
const TEND=new Date('2026-07-19T23:59:59');

function fmtDay(iso){const d=new Date(iso+'T12:00:00Z');return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}

function groupStageDays(){
  if(apiMatches.length){
    return[...new Set(apiMatches.filter(m=>m.stage==='GROUP_STAGE').map(m=>m.utcDate.slice(0,10)))].sort();
  }
  return["2026-06-11","2026-06-12","2026-06-13","2026-06-14","2026-06-15","2026-06-16","2026-06-17","2026-06-18","2026-06-19","2026-06-20","2026-06-21","2026-06-22","2026-06-23","2026-06-24","2026-06-25","2026-06-26","2026-06-27"];
}

function renderToday(){
  const c=document.getElementById('today-content');
  const now=new Date();
  if(now<TSTART){
    const diff=TSTART-now;
    const dy=Math.floor(diff/86400000);
    const hr=Math.floor((diff%86400000)/3600000);
    const mn=Math.floor((diff%3600000)/60000);
    const sc=Math.floor((diff%60000)/1000);
    c.innerHTML='<div class="countdown-wrap"><div class="countdown-label">Tournament kicks off in</div><div class="countdown-units"><div class="cunit"><div class="cunit-num" id="cd-d">'+dy+'</div><div class="cunit-label">Days</div></div><div class="cunit"><div class="cunit-num" id="cd-h">'+String(hr).padStart(2,'0')+'</div><div class="cunit-label">Hours</div></div><div class="cunit"><div class="cunit-num" id="cd-m">'+String(mn).padStart(2,'0')+'</div><div class="cunit-label">Mins</div></div><div class="cunit"><div class="cunit-num" id="cd-s">'+String(sc).padStart(2,'0')+'</div><div class="cunit-label">Secs</div></div></div><div class="countdown-msg">\ud83c\uddf2\ud83c\uddfd Mexico vs South Africa opens on 11 June in Mexico City</div></div><div id="preview-fix"></div>';
    clearInterval(window._cdi);
    window._cdi=setInterval(()=>{
      const d2=TSTART-new Date();if(d2<=0){clearInterval(window._cdi);renderToday();return;}
      document.getElementById('cd-d').textContent=Math.floor(d2/86400000);
      document.getElementById('cd-h').textContent=String(Math.floor((d2%86400000)/3600000)).padStart(2,'0');
      document.getElementById('cd-m').textContent=String(Math.floor((d2%3600000)/60000)).padStart(2,'0');
      document.getElementById('cd-s').textContent=String(Math.floor((d2%60000)/1000)).padStart(2,'0');
    },1000);
    renderDayMatches('2026-06-11',document.getElementById('preview-fix'),false);
    return;
  }
  if(now>TEND){c.innerHTML='<div class="no-games"><div class="icon">\ud83c\udfc6</div><p>The 2026 World Cup has concluded!</p></div>';return;}
  const todayISO=now.toISOString().slice(0,10);
  const days=groupStageDays();
  let nav='<div class="today-nav">';
  days.forEach(d=>{
    const isTd=d===todayISO;
    nav+='<button class="'+(isTd?'active-day':'')+'" onclick="pickDay(\''+d+'\',this)">'+fmtDay(d)+(isTd?'<span class="today-badge">Today</span>':'')+'</button>';
  });
  nav+='</div><div id="day-fix"></div>';
  c.innerHTML=nav;
  renderDayMatches(todayISO,document.getElementById('day-fix'),true);
}

function pickDay(iso,btn){
  document.querySelectorAll('.today-nav button').forEach(b=>b.classList.remove('active-day'));
  btn.classList.add('active-day');
  renderDayMatches(iso,document.getElementById('day-fix'),true);
}

function renderDayMatches(iso,container,showHead){
  if(!container)return;
  const ms=apiMatches.filter(m=>m.stage==='GROUP_STAGE'&&m.utcDate.startsWith(iso));
  if(!ms.length&&!apiMatches.length){container.innerHTML='<div class="no-games"><div class="icon">\ud83d\udce1</div><p>Fetching live data…</p></div>';return;}
  if(!ms.length){container.innerHTML='<div class="no-games"><div class="icon">\ud83d\ude34</div><p>No group stage matches on '+fmtDay(iso)+'.</p></div>';return;}
  const live=ms.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  let html='';
  if(showHead)html='<div class="today-date-heading">'+fmtDay(iso)+' \u2014 '+ms.length+' match'+(ms.length!==1?'es':'')+(live?' <span class="live-pill">\u25cf Live</span>':'')+'</div>';
  else html='<div class="owner-fixtures-title" style="margin-bottom:.8rem">\u26bd Opening matches \u2014 11 June</div>';
  html+='<div class="fixtures-list">';
  ms.forEach(m=>{
    const h=norm(m.homeTeam?.shortName||m.homeTeam?.name||'');
    const a=norm(m.awayTeam?.shortName||m.awayTeam?.name||'');
    if(h&&a)html+=fixtureCard(h,a,false);
  });
  html+='</div>';
  container.innerHTML=html;
}

function renderParticipants(filter){
  const f=(filter||'').toLowerCase();
  const html=Object.entries(owners).filter(([t,o])=>!f||t.toLowerCase().includes(f)||o.toLowerCase().includes(f)).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,o])=>'<div class="p-card"><div class="p-flag">'+(flags[t]||'🏳')+'</div><div class="p-team">'+t+'</div><div><span class="p-group">Group '+teamGroup[t]+'</span></div><div class="p-owner">'+o+'</div></div>').join('');
  document.getElementById('participants-grid').innerHTML=html||'<p style="color:var(--muted);grid-column:1/-1">No results.</p>';
}
function filterParticipants(v){renderParticipants(v);}

function renderOwnerView(owner){
  const c=document.getElementById('owner-content');
  if(!owner){c.innerHTML='';return;}
  const myT=Object.entries(owners).filter(([,o])=>o===owner).map(([t])=>t);
  const ini=owner.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  let html='<div class="owner-profile"><div class="owner-avatar">'+ini+'</div><div><div class="owner-name">'+owner+'</div><div class="owner-tag">'+myT.length+' team'+(myT.length!==1?'s':'')+' in the sweepstake</div></div></div>';
  html+='<div class="owner-fixtures-title">\ud83c\udfd9 Your Teams</div><div class="owner-teams-grid">';
  myT.forEach(t=>{html+='<div class="owner-team-card"><span class="owner-team-flag">'+(flags[t]||'🏳')+'</span><div><div class="owner-team-name">'+t+'</div><div class="owner-team-group">Group '+teamGroup[t]+'</div></div></div>';});
  html+='</div>';
  const myPairs=[];
  Object.keys(groups).forEach(g=>{allPairs(g).forEach(([h,a])=>{if(myT.includes(h)||myT.includes(a))myPairs.push([h,a]);});});
  html+='<div class="owner-fixtures-title">\ud83d\udcc5 Your Fixtures ('+myPairs.length+' matches)</div><div class="fixtures-list">';
  myPairs.forEach(([h,a])=>{
    const both=myT.includes(h)&&myT.includes(a);
    html+=fixtureCard(h,a,true);
    if(both)html+='<div style="text-align:center;margin:-0.2rem 0 .4rem"><span class="both-badge">\u26a1 Both yours!</span></div>';
  });
  html+='</div>';
  c.innerHTML=html;
}

function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('visible');
  btn.classList.add('active');
}

// Init
renderParticipants();
renderFixtures();
renderToday();
const sel=document.getElementById('owner-select');
[...new Set(Object.values(owners))].sort().forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;sel.appendChild(opt);});
fetchMatches();
</script>
</body>
</html>
