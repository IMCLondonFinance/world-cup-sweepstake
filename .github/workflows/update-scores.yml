name: Update Scores

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch scores from football-data.org
        env:
          API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, datetime

          token = os.environ['API_TOKEN']
          base  = 'https://api.football-data.org/v4'
          headers = {'X-Auth-Token': token}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          try:
              matches   = fetch(f'{base}/competitions/WC/matches?season=2026')
              standings = fetch(f'{base}/competitions/WC/standings?season=2026')
              scorers   = fetch(f'{base}/competitions/WC/scorers?season=2026&limit=20')

              output = {
                  'lastUpdated': datetime.datetime.utcnow().isoformat() + 'Z',
                  'matches':     matches.get('matches', []),
                  'standings':   standings.get('standings', []),
                  'scorers':     scorers.get('scorers', []),
              }

              with open('scores.json', 'w') as f:
                  json.dump(output, f)

              print(f"Wrote scores.json: {len(output['matches'])} matches, {len(output['standings'])} standing groups")

          except Exception as e:
              print(f'Error fetching data: {e}')
              # Don't fail the action — keep existing scores.json
              import sys; sys.exit(0)
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          if git diff --staged --quiet; then
            echo "No changes to scores.json"
          else
            git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
