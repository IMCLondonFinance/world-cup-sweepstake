name: Update Scores

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Fetch scores
        env:
          API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, os, datetime

          token = os.environ['API_TOKEN']
          base  = 'https://api.football-data.org/v4'
          headers = {'X-Auth-Token': token}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          try:
              matches   = fetch(f'{base}/competitions/WC/matches?season=2026')
              standings = fetch(f'{base}/competitions/WC/standings?season=2026')
              scorers   = fetch(f'{base}/competitions/WC/scorers?season=2026&limit=20')

              output = {
                  'lastUpdated': datetime.datetime.now(datetime.timezone.utc).isoformat(),
                  'matches':     matches.get('matches', []),
                  'standings':   standings.get('standings', []),
                  'scorers':     scorers.get('scorers', []),
              }

              with open('scores.json', 'w') as f:
                  json.dump(output, f)

              finished = sum(1 for m in output['matches'] if m['status'] == 'FINISHED')
              live     = sum(1 for m in output['matches'] if m['status'] in ('IN_PLAY', 'PAUSED'))
              print(f'OK: {finished} finished, {live} live')

          except Exception as e:
              print(f'Error: {e}')
              raise
          PYEOF

      - name: Push scores
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && echo "Push succeeded" && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed but scores were fetched"
          exit 0
