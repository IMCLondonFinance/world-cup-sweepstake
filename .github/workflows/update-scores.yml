name: Update Scores

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch and push scores
        env:
          API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os, datetime, base64

          # ── football-data.org ──────────────────────────────────────
          api_token = os.environ['API_TOKEN']
          base = 'https://api.football-data.org/v4'

          def fetch_api(url):
              req = urllib.request.Request(url, headers={'X-Auth-Token': api_token})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          try:
              matches   = fetch_api(f'{base}/competitions/WC/matches?season=2026')
              standings = fetch_api(f'{base}/competitions/WC/standings?season=2026')
              scorers   = fetch_api(f'{base}/competitions/WC/scorers?season=2026&limit=20')
          except Exception as e:
              print(f'Failed to fetch from API: {e}')
              exit(0)

          output = {
              'lastUpdated': datetime.datetime.now(datetime.timezone.utc).isoformat(),
              'matches':     matches.get('matches', []),
              'standings':   standings.get('standings', []),
              'scorers':     scorers.get('scorers', []),
          }
          content = json.dumps(output)
          finished = sum(1 for m in output['matches'] if m['status'] == 'FINISHED')
          live     = sum(1 for m in output['matches'] if m['status'] in ('IN_PLAY','PAUSED'))
          print(f'Fetched: {finished} finished, {live} live')

          # ── GitHub API — get current file SHA ─────────────────────
          gh_token = os.environ['GITHUB_TOKEN']
          repo     = os.environ['REPO']
          gh_url   = f'https://api.github.com/repos/{repo}/contents/scores.json'
          gh_headers = {
              'Authorization': f'Bearer {gh_token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # Get existing SHA (needed to update)
          try:
              req = urllib.request.Request(gh_url, headers=gh_headers)
              with urllib.request.urlopen(req) as r:
                  file_info = json.loads(r.read())
              sha = file_info['sha']
              print(f'Got existing SHA: {sha[:8]}')
          except Exception as e:
              print(f'Could not get file SHA: {e}')
              sha = None

          # Push via GitHub API (atomic — no git conflicts possible)
          now = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          payload = {
              'message': f'Update scores {now}',
              'content': base64.b64encode(content.encode()).decode(),
          }
          if sha:
              payload['sha'] = sha

          try:
              data = json.dumps(payload).encode()
              req = urllib.request.Request(gh_url, data=data, headers={**gh_headers, 'Content-Type':'application/json'}, method='PUT')
              with urllib.request.urlopen(req) as r:
                  print(f'scores.json updated successfully')
          except urllib.error.HTTPError as e:
              print(f'GitHub API error {e.code}: {e.read().decode()}')
          except Exception as e:
              print(f'Push error: {e}')
          PYEOF
